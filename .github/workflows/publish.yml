name: Publish

# Tag-triggered npm publish for the four publishable packages in this
# monorepo, modelled on the trellis publish workflow. Uses npm Trusted
# Publishing via OIDC — each package must be registered as a Trusted
# Publisher on npmjs.org first (repo `de-otio/saas-foundation`, workflow
# `.github/workflows/publish.yml`); once set up, tagged releases publish
# without any manual OTP or NPM_TOKEN.
#
# THE FILE NAME IS LOAD-BEARING: npm Trusted Publishing binds each package's
# trusted publisher to this repo + this workflow file path. Renaming the file
# means re-configuring the trusted publisher on npmjs.com for every package.
#
# Tag format (the changesets-style scoped tag, kept for continuity):
#   @de-otio/saas-foundation@<version>      → packages/foundation
#   @de-otio/saas-foundation-cdk@<version>  → packages/foundation-cdk
#   @de-otio/vestibulum@<version>           → packages/vestibulum
#   @de-otio/vestibulum-cdk@<version>       → packages/vestibulum-cdk
#
# The workflow verifies the tag's version matches the target package.json
# version before publishing, so a bad tag can't publish the wrong thing.
#
# To cut a release: bump the package's version in its package.json, commit,
# then push a matching tag, e.g.
#   git tag '@de-otio/vestibulum-cdk@1.0.0' && git push origin '@de-otio/vestibulum-cdk@1.0.0'
#
# FIRST PUBLISH is manual (the package does not yet exist on npm, so Trusted
# Publishing has nothing to bind to). Publish 0.x once by hand from a clean
# checkout, then configure the Trusted Publisher on npmjs.org pointing at this
# repo + workflow file; every tagged release after that is automated.

on:
  push:
    tags:
      - "@de-otio/saas-foundation@*"
      - "@de-otio/saas-foundation-cdk@*"
      - "@de-otio/vestibulum@*"
      - "@de-otio/vestibulum-cdk@*"

# Serialise publish runs but never cancel an in-flight publish — a half-run
# npm publish must not be aborted by a newer tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC for Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Node 24 ships npm v11. npm Trusted Publishing requires npm >= 11.5.1;
      # Node 22 ships npm 10 which fails with a misleading "404 Not Found" on
      # PUT immediately after provenance is signed. .nvmrc pins 24.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Resolve target package from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NAME="${TAG%@*}"        # strip @<version> → @de-otio/<pkg>
          VERSION="${TAG##*@}"    # everything after the last @ → <version>
          case "$NAME" in
            @de-otio/saas-foundation)     DIR=packages/foundation ;;
            @de-otio/saas-foundation-cdk) DIR=packages/foundation-cdk ;;
            @de-otio/vestibulum)          DIR=packages/vestibulum ;;
            @de-otio/vestibulum-cdk)      DIR=packages/vestibulum-cdk ;;
            *)
              echo "::error::Unrecognised package in tag: $TAG (name '$NAME')"
              exit 1
              ;;
          esac
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      # Topological build (foundation → foundation-cdk → vestibulum →
      # vestibulum-cdk): cross-package imports resolve against built dist/,
      # and dist/ is gitignored so it must be produced here before packing.
      - run: npm run build

      # vestibulum-cdk ships its Lambda bundles in the tarball (package.json
      # `files` includes "lambda-bundles"), but they are gitignored build
      # artifacts. Build them after dist/ exists, then verify they match the
      # committed SHA-256 lock before publishing.
      - name: Build + verify Lambda bundles (vestibulum-cdk only)
        if: steps.pkg.outputs.name == '@de-otio/vestibulum-cdk'
        run: |
          npm run build-bundles --workspace=@de-otio/vestibulum-cdk
          npm run verify-bundles --workspace=@de-otio/vestibulum-cdk

      - name: Verify package.json version matches tag
        run: |
          cd "${{ steps.pkg.outputs.dir }}"
          ACTUAL=$(node -p "require('./package.json').version")
          EXPECTED="${{ steps.pkg.outputs.version }}"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Tag version ($EXPECTED) does not match package.json version ($ACTUAL) for ${{ steps.pkg.outputs.name }}"
            exit 1
          fi

      - name: Select dist-tag from version
        id: disttag
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          case "$VERSION" in
            *-alpha*) TAG=alpha ;;
            *-beta*)  TAG=beta ;;
            *-rc*)    TAG=rc ;;
            *-*)      TAG=next ;;
            *)        TAG=latest ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # --provenance: the repo is public, so npm attaches a sigstore build
      # provenance attestation. (Drop --provenance only if the repo is ever
      # made private again — provenance 422s on private source repos.)
      - name: Publish ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --access public --provenance --tag "${{ steps.disttag.outputs.tag }}"
