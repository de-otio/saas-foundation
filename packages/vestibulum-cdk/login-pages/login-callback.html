<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f5;
      }
      .spinner {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .spinner::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 4px solid #e0e0e0;
        border-top-color: #333;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <noscript>
      <p>JavaScript is required to complete authentication. Please enable JavaScript and try again.</p>
    </noscript>
    <script src="callback.js"></script>
  </body>
</html>
